<script>

const SYS = 'You are WIYAMO, a free UK immigration guidance assistant built specifically for Nigerian and African migrants. Deep knowledge of: UK visa routes (Health and Care Worker, Skilled Worker, Student, Family, Leave to Remain), Certificate of Sponsorship (CoS) — what it is, who can issue it, how to find licensed sponsors on the official UKVI Sponsor Register at gov.uk, how to approach them, timelines. Section 3C leave — what it is, why it matters, how it protects someone while an application is pending. The 28-day window for switching employers under a Skilled Worker visa. Extension applications — forms, fees, timelines. OISC-registered adviser directories. What is genuinely free vs what agents fraudulently charge for. Common scams. UK driving licence process and fast-tracking. Real 2026 UK visa fees: Student £558, IHS £776/year, TB test ~$95, Skilled Worker £819-£1,618, Health and Care Worker £284, Partner visa £2,064, Visitor £135. Always respond in plain English. Be direct, warm, specific. Never vague. Never guarantee outcomes. Cite gov.uk when relevant. Keep responses scannable with line breaks. Built by Oluwadarasimi, a 17-year-old from Abeokuta, because his mum needed this exact tool.';

// ===== GLOBE =====
const canvas = document.getElementById('globe-canvas');
const ctx = canvas.getContext('2d');
let gW, gH;

function resizeCanvas(){
  gW = canvas.width = window.innerWidth;
  gH = canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const countries = {
  'Nigeria':      {lat:9.082,  lon:8.675,  main:true},
  'Ghana':        {lat:7.946,  lon:-1.023},
  'Kenya':        {lat:-0.024, lon:37.906},
  'Ethiopia':     {lat:9.145,  lon:40.489},
  'South Africa': {lat:-30.559,lon:22.937},
  'Egypt':        {lat:26.821, lon:30.802},
  'Tanzania':     {lat:-6.369, lon:34.889},
  'Cameroon':     {lat:7.370,  lon:12.355},
  'Senegal':      {lat:14.497, lon:-14.452},
  'Angola':       {lat:-11.203,lon:17.874},
  'United Kingdom':{lat:55.378,lon:-3.436, uk:true},
};

function latLonToXYZ(lat, lon, radius){
  const phi = (90 - lat) * Math.PI / 180;
  const theta = (lon + 180) * Math.PI / 180;
  return {
    x: -radius * Math.sin(phi) * Math.cos(theta),
    y:  radius * Math.cos(phi),
    z:  radius * Math.sin(phi) * Math.sin(theta)
  };
}

function project3D(x, y, z, rotY){
  const cosR = Math.cos(rotY), sinR = Math.sin(rotY);
  const rx = x * cosR - z * sinR;
  const rz = x * sinR + z * cosR;
  const r = Math.min(gW, gH) * 0.35;
  const scale = r / (r + rz);
  return {
    x: gW/2 + rx * scale,
    y: gH/2 - y * scale,
    z: rz, scale,
    visible: rz < r * 0.5
  };
}

let buildDots = [];
function rebuildDots(){
  buildDots = [];
  const r = Math.min(gW, gH) * 0.35;
  for(let lat=-80; lat<=80; lat+=8){
    for(let lon=-180; lon<180; lon+=8){
      const xyz = latLonToXYZ(lat, lon, r);
      buildDots.push({...xyz, lat, lon});
    }
  }
}
rebuildDots();
window.addEventListener('resize', rebuildDots);

let rotY = 0;
let globeState = 'spinning';
let lockStart = 0;
let africaOn = false;
let heroShown = false;
const startTime = Date.now();

function drawGlobe(){
  const r = Math.min(gW, gH) * 0.35;
  ctx.clearRect(0, 0, gW, gH);

  buildDots.forEach(d => {
    const p = project3D(d.x, d.y, d.z, rotY);
    if(!p.visible) return;
    const isAfrica = d.lat>-35 && d.lat<38 && d.lon>-20 && d.lon<55;
    const isUK = d.lat>49 && d.lat<61 && d.lon>-11 && d.lon<2;
    let color = `rgba(122,143,166,${0.15 + p.scale*0.3})`;
    let size = 1.4 * p.scale;
    if(africaOn && isAfrica){ color=`rgba(232,115,74,${0.5+p.scale*0.3})`; size=2.2*p.scale; }
    if(africaOn && isUK){ color=`rgba(45,106,79,${0.7+p.scale*0.2})`; size=2.4*p.scale; }
    ctx.beginPath(); ctx.arc(p.x, p.y, Math.max(0.5,size), 0, Math.PI*2);
    ctx.fillStyle = color; ctx.fill();
  });

  if(africaOn){
    Object.entries(countries).forEach(([name, data]) => {
      const xyz = latLonToXYZ(data.lat, data.lon, r * 1.06);
      const p = project3D(xyz.x, xyz.y, xyz.z, rotY);
      if(!p.visible || p.scale < 0.3) return;
      ctx.font = data.main
        ? `600 ${Math.round(13*p.scale+4)}px Inter,sans-serif`
        : `300 ${Math.round(10*p.scale+2)}px Inter,sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = data.main ? '#E8734A' : data.uk ? '#2D6A4F' : 'rgba(237,240,244,0.88)';
      ctx.fillText(name, p.x, p.y - 8);
      ctx.beginPath(); ctx.arc(p.x, p.y + 4, data.main?3:1.8, 0, Math.PI*2);
      ctx.fillStyle = data.main ? '#E8734A' : data.uk ? '#2D6A4F' : 'rgba(237,240,244,0.5)';
      ctx.fill();
    });

    const nXYZ = latLonToXYZ(9.082, 8.675, r*1.03);
    const uXYZ = latLonToXYZ(55.378, -3.436, r*1.03);
    const nP = project3D(nXYZ.x, nXYZ.y, nXYZ.z, rotY);
    const uP = project3D(uXYZ.x, uXYZ.y, uXYZ.z, rotY);
    if(nP.visible && uP.visible){
      const mx = (nP.x+uP.x)/2;
      const my = Math.min(nP.y,uP.y) - 70;
      ctx.beginPath(); ctx.moveTo(nP.x, nP.y);
      ctx.quadraticCurveTo(mx, my, uP.x, uP.y);
      ctx.strokeStyle = 'rgba(232,115,74,0.55)';
      ctx.lineWidth = 1.5; ctx.setLineDash([6,5]); ctx.stroke(); ctx.setLineDash([]);
      const t = (Date.now() % 3200) / 3200;
      const ax = (1-t)*(1-t)*nP.x + 2*(1-t)*t*mx + t*t*uP.x;
      const ay = (1-t)*(1-t)*nP.y + 2*(1-t)*t*my + t*t*uP.y;
      ctx.beginPath(); ctx.arc(ax, ay, 4, 0, Math.PI*2);
      ctx.fillStyle = '#E8734A'; ctx.fill();
      ctx.beginPath(); ctx.arc(ax, ay, 7, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(232,115,74,0.2)'; ctx.fill();
    }
  }
}

function animateGlobe(){
  const now = Date.now();
  const r = Math.min(gW, gH) * 0.35;

  if(globeState === 'spinning'){
    rotY += 0.008;
    if(now - startTime > 3000){ globeState = 'slowing'; }
  } else if(globeState === 'slowing'){
    const target = -0.3;
    rotY += (target - rotY) * 0.03;
    if(Math.abs(rotY - target) < 0.01){ globeState = 'locked'; lockStart = now; africaOn = true; }
  } else if(globeState === 'locked'){
    if(now - lockStart > 2800){
      globeState = 'resuming';
      if(!heroShown){
        heroShown = true;
        gsap.to('#heroText', {opacity:1, y:-20, duration:1.4, ease:'power2.out'});
        gsap.to('#scrollHint', {opacity:1, duration:1, delay:1.6});
      }
    }
  } else if(globeState === 'resuming'){
    rotY += 0.0018;
  }

  drawGlobe();
  requestAnimationFrame(animateGlobe);
}
animateGlobe();

// ===== STATS COUNTERS =====
document.querySelectorAll('.stat-num').forEach(el=>{
  const target = parseInt(el.dataset.target);
  const prefix = el.dataset.prefix || '';
  ScrollTrigger.create({
    trigger:el, start:'top 85%', once:true,
    onEnter:()=>{
      const t0 = performance.now();
      const dur = 2200;
      function tick(now){
        const p = Math.min((now-t0)/dur, 1);
        const ease = 1 - Math.pow(1-p, 3);
        el.textContent = prefix + Math.round(target * ease).toLocaleString();
        if(p < 1) requestAnimationFrame(tick);
        else if(el.classList.contains('strike')) setTimeout(()=>el.classList.add('struck'), 400);
      }
      requestAnimationFrame(tick);
    }
  });
});

// ===== BREATH OVERLAY =====
function playBreath(cb){
  const ov = document.getElementById('breath');
  const ring = document.getElementById('bRing');
  const msg = document.getElementById('bMsg');
  ov.classList.add('on');
  gsap.to(ring,{width:Math.max(gW,gH)*1.6,height:Math.max(gW,gH)*1.6,duration:2.2,ease:'power2.inOut'});
  gsap.to(msg,{opacity:1,duration:1.4,delay:.6,ease:'power2.out'});
  gsap.to(msg,{opacity:0,duration:.8,delay:3.8});
  gsap.to(ov,{opacity:0,duration:.9,delay:4.8,onComplete:()=>{
    ov.classList.remove('on');
    ring.style.width='0'; ring.style.height='0';
    msg.style.opacity='0';
    cb && cb();
  }});
}

let breathPlayed = false;
ScrollTrigger.create({
  trigger:'#situation', start:'top 60%', once:true,
  onEnter:()=>{ if(!breathPlayed){ breathPlayed=true; playBreath(); } }
});

// ===== SITUATION ENGINE =====
let curQ = 0;
const answers = {};
const TOTAL = 6;

function showQ(n){
  document.querySelectorAll('.q-card').forEach(c=>c.classList.remove('on'));
  const card = document.querySelector(`.q-card[data-q="${n}"]`);
  if(card) card.classList.add('on');
  document.getElementById('pFill').style.width = (n/TOTAL*100)+'%';
}

function nextQ(){
  curQ++;
  if(curQ >= TOTAL) showResult();
  else showQ(curQ);
}

document.querySelectorAll('.opt').forEach(btn=>{
  btn.addEventListener('click', function(){
    const card = this.closest('.q-card');
    if(!card) return;
    card.querySelectorAll('.opt').forEach(b=>b.classList.remove('sel'));
    this.classList.add('sel');
    answers[card.dataset.q] = this.dataset.v;
    setTimeout(nextQ, 360);
  });
});

const concernInp = document.getElementById('concernInp');
const seeBtn = document.getElementById('seeBtn');
concernInp.addEventListener('input',()=>{
  if(concernInp.value.trim()){ seeBtn.classList.add('active'); }
  else seeBtn.classList.remove('active');
});
seeBtn.addEventListener('click',()=>{
  answers[5] = concernInp.value.trim();
  showResult();

async function showResult(){
  document.getElementById('pFill').style.width = '100%';
  document.querySelectorAll('.q-card').forEach(c=>c.classList.remove('on'));
  const pw = document.getElementById('passWrap');
  pw.style.display = 'block';
  setTimeout(()=>document.getElementById('passCard').classList.add('flipped'), 600);

  const loc    = answers[0] || 'your location';
  const goal   = answers[1] || '';
  const status = answers[2] || '';
  const emp    = answers[3] || '';
  const letter = answers[4] || '';
  const concern= answers[5] || '';

  document.getElementById('resH').innerText = 'Mapping your route...';
  document.getElementById('resB').innerHTML = '<div class="ecg-wrap" style="margin-top:.5rem"><svg viewBox="0 0 56 20"><path class="ecg-path" d="M0 10 L8 10 L12 3 L16 17 L20 10 L28 10 L32 6 L36 14 L40 10 L56 10"/></svg><span style="color:var(--mist);font-size:.78rem;margin-left:.5rem">Analysing your situation...</span></div>';

  const { h, b } = await getRoute({loc, goal, status, emp, letter, concern});

  document.getElementById('resH').innerText = h;
  document.getElementById('resB').innerHTML = b.replace(/\n/g,'<br>').replace(/⚠/g,'<strong>⚠</strong>');

  const distressWords = ['scared','afraid','depress','suicid','hopeless','give up','cant cope',"can't cope",'overwhelm','crying','desperate','ashamed','shame','alone','no one to talk','breakdown'];
  const concernLower = concern.toLowerCase();
  const hasDistressLanguage = distressWords.some(w=>concernLower.includes(w));
  document.getElementById('crisisCard').classList.toggle('show', hasDistressLanguage);
}

async function getRoute({loc, goal, status, emp, letter, concern}){
  try{
      const prompt = `A user filling out WIYAMO's Situation Engine gave these answers:\nLocation: ${loc}\nGoal: ${goal}\nCurrent visa/leave status: ${status}\nEmployment situation: ${emp}\nHome Office letters received: ${letter}\nTheir own words on their biggest concern: "${concern}"\n\nGive them a short route title (max 6 words) on its own first line starting with "TITLE:", then a clear, specific, plain-English breakdown of: their situation, every legitimate option available to them right now, numbered next steps, real 2026 UK fees relevant to their case, and one direct warning if relevant about scams or deadlines. Reference their stated concern directly. End with a reminder this is information not legal advice. Keep it well under 280 words, scannable with line breaks, no markdown asterisks.`;
      const r = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ role: 'user', parts: [{ text: prompt }] }],
          systemInstruction: { parts: [{ text: SYS }] }
        })
      });
      if(!r.ok){
        const errText = await r.text();
        return { h: 'API Error', b: `Status: ${r.status}\nResponse: ${errText}` };
      }
      const d = await r.json();
      const text = d.candidates?.[0]?.content?.parts?.[0]?.text;
      if(text){
        const titleMatch = text.match(/^TITLE:\s*(.+)$/m);
        const h = titleMatch ? titleMatch[1].trim() : 'Your Route';
        const b = text.replace(/^TITLE:\s*.+$/m,'').trim();
        return { h, b };
      }
      return { h: 'API Error', b: `No text in response.\nRaw: ${JSON.stringify(d).slice(0,500)}` };
  }catch(e){
      return { h: 'API Error', b: `Error: ${e.message}\nType: ${e.name}` };
  }
}

function hardcodedRoute({loc, goal, status, emp, letter, concern}){
  let h, b;

  if(goal === 'study'){
    h = 'Student Visa Route';
    b = `You are applying from ${loc}. Here is what you actually need:\n\n1. Get a CAS (Confirmation of Acceptance for Studies) from a UK university — this is free from your institution\n2. Prove funds: £1,483/month for London or £1,136/month elsewhere, held for 28 days\n3. Visa fee: £558 (from April 2026)\n4. Immigration Health Surcharge: £776/year — paid upfront\n5. TB test at an IOM clinic (~$95). Nigeria: Abuja, Benin City, Lagos\n6. Biometrics at TLScontact (Lagos or Abuja)\n\nProcessing: ~3 weeks standard. Priority +£500 (5 days). Super Priority +£1,000 (next day).\n\nYour concern: "${concern}"\n\n⚠ Nobody can "guarantee" visa approval. Any agent saying so is lying to you.`;
  } else if(goal === 'health-care'){
    h = 'Health and Care Worker Visa';
    b = `Good news — this visa has reduced fees and a faster route.\n\n1. You need a job offer from a CQC-regulated employer with a sponsor licence\n2. The employer issues a Certificate of Sponsorship (CoS) — this is free and done by your employer\n3. Visa fee: £284 (significantly lower than Skilled Worker)\n4. IHS: £0 — Health and Care Workers are exempt\n5. Salary minimum: £29,000 or the going rate for your role, whichever is higher\n\nApplying from ${loc}:\n• Check the UKVI Sponsor Register: gov.uk/government/publications/register-of-licensed-sponsors-workers\n• Filter by "Health & Social Care"\n\nYour concern: "${concern}"\n\n⚠ Any agent charging £5,000+ for a "CoS connection" is running a scam. The register is public and free.`;
  } else if(goal === 'work' || goal === 'new-sponsor' || emp === 'employer-closed'){
    h = emp === 'employer-closed' ? 'Your Employer Closed — Here is What to Do' : 'Skilled Worker Route';
    b = emp === 'employer-closed'
      ? `Your sponsor's licence was revoked. Under UK law you have 60 days to find a new sponsor.\n\n1. Search the UKVI Sponsor Register immediately: gov.uk/government/publications/register-of-licensed-sponsors-workers\n2. Contact potential employers directly — a CoS is a reference number they assign to you, not something you buy\n3. Apply for a new visa once you have a CoS — you do not need to leave the UK\n4. If your current leave expires before you find a sponsor, Section 3C leave may protect you\n\nYour concern: "${concern}"\n\n⚠ If someone is offering to "find you a sponsor" for £3,000+, walk away. The register is free.`
      : `You need a job offer from a licensed UK employer.\n\n1. Minimum salary: typically £38,700 (or £23,200 for new entrant roles)\n2. English language: CEFR Level B1 minimum\n3. Your employer issues a Certificate of Sponsorship (CoS)\n4. Visa fee: £819 (up to 3 years) or £1,618 (over 3 years)\n5. IHS: £1,035/year\n6. Maintenance funds: £1,270 held for 28 days\n\nFrom ${loc} — search: gov.uk/government/publications/register-of-licensed-sponsors-workers\n\nYour concern: "${concern}"\n\n⚠ Health and Care Worker visa (£284) is available for specific care roles — cheaper and IHS-exempt.`;
  } else if(goal === 'extend-stay' || status === 'expired'){
    h = status === 'expired' ? 'URGENT — Your Visa Has Expired' : 'Extending Your Stay';
    b = status === 'expired'
      ? `Do not panic. You may still have options.\n\n1. Section 3C leave: if you applied for an extension before your visa expired, you are legally protected while the application is pending — you have not overstayed\n2. If you have not applied yet: do so immediately at gov.uk/remain-in-uk\n3. If a curtailment notice was issued: you may have 60 days to resolve your status\n\nExtension costs:\n• Skilled/Health Care Worker: £827 (in-country)\n• Student: £490\n• IHS still applies\n\nYour concern: "${concern}"\n\n⚠ A lawyer filing Section 3C paperwork should cost under £500. Anyone quoting £3,000+ for this is overcharging.`
      : `Extending your visa from inside the UK:\n\n1. Apply at least 28 days before your current visa expires at gov.uk/remain-in-uk\n2. Once submitted, Section 3C leave protects your status while it is pending\n3. Same employer: your sponsor simply assigns a new CoS — free\n4. New employer: find them on the UKVI register, get a new CoS\n\nFees depend on your visa type. Ask WIYAMO in the chat below for your specific route.\n\nYour concern: "${concern}"`;
  } else if(letter === 'curtailment' || letter === 'refusal'){
    h = letter === 'refusal' ? 'You Received a Refusal — You Have Options' : 'Curtailment Notice — Act Within Your Deadline';
    b = letter === 'refusal'
      ? `A refusal is not the end.\n\n1. Check if you have Administrative Review rights — usually 28 days to apply\n2. Check if you have appeal rights — check the refusal letter carefully\n3. Contact an OISC-registered adviser: gov.uk/find-an-immigration-adviser\n4. Do not reapply with the same documents — the same reason will cause the same refusal\n\nYour concern: "${concern}"\n\n⚠ Free initial consultations are available from many OISC advisers. Never pay £5,000+ without a clear fee breakdown in writing.`
      : `A curtailment notice means your current visa has been shortened.\n\n1. Read the letter — it states your new leave expiry date and your deadline to take action\n2. You typically have 60 days from the date of the letter to find a new sponsor or leave\n3. If you find a new sponsor in time, apply for a new visa — you do not need to leave the UK\n4. Section 3C leave applies once a new application is submitted\n\nYour concern: "${concern}"\n\n⚠ Many curtailment cases can be resolved without leaving the UK. Get OISC advice before paying anyone.`;
  } else if(goal === 'family'){
    h = 'Family / Partner Visa Route';
    b = `Joining family in the UK from ${loc}:\n\n1. Partner visa fee: £2,064 (from April 2026)\n2. Your UK sponsor (partner/spouse) must earn minimum £29,000/year\n3. English language requirement: B1 minimum\n4. Genuine relationship evidence: photos, messages, proof of visits, shared finances\n5. Processing: up to 24 weeks standard. Priority available for +£500\n6. After 5 years: eligible for Indefinite Leave to Remain (£3,226)\n\nYour concern: "${concern}"\n\n⚠ No agent can fast-track a family visa through unofficial channels. All applications go through the same UKVI system.`;
  } else {
    h = 'Your Immigration Options';
    b = `Based on your situation in ${loc}:\n\n1. Check your current visa expiry and status on your BRP or at gov.uk/view-prove-immigration-status\n2. Visit gov.uk/browse/visas-immigration for the official guidance on your specific route\n3. Use the UKVI Sponsor Register if you need a new employer: gov.uk/government/publications/register-of-licensed-sponsors-workers\n4. Find a free or low-cost OISC adviser: gov.uk/find-an-immigration-adviser\n\nYour concern: "${concern}"\n\n⚠ All legitimate costs are published on gov.uk. Any significant "admin fee" or "agent charge" on top is an overcharge. Ask WIYAMO in the chat below for your specific situation.`;
  }
  return { h, b };
}

// ===== CHAT =====
const chatMsgs = document.getElementById('chatMsgs');
const chatInp = document.getElementById('chatInp');

function addBub(text, isMe){
  const d = document.createElement('div');
  d.className = 'bub ' + (isMe ? 'me' : 'ai');
  if(!isMe) d.innerHTML = '<div class="ai-tag">WIYAMO</div>' + text.replace(/\n/g,'<br>');
  else d.textContent = text;
  chatMsgs.appendChild(d);
  chatMsgs.scrollTop = chatMsgs.scrollHeight;
}

function addECG(){
  const d = document.createElement('div');
  d.className = 'bub ai'; d.id = 'ecg';
  d.innerHTML = '<div class="ai-tag">WIYAMO</div><div class="ecg-wrap"><svg viewBox="0 0 56 20"><path class="ecg-path" d="M0 10 L8 10 L12 3 L16 17 L20 10 L28 10 L32 6 L36 14 L40 10 L56 10"/></svg><span>Thinking...</span></div>';
  chatMsgs.appendChild(d); chatMsgs.scrollTop = chatMsgs.scrollHeight;
}
function removeECG(){ const e=document.getElementById('ecg'); if(e)e.remove(); }

async function callGemini(msg){
  try{
    const r = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ role: 'user', parts: [{ text: msg }] }],
        systemInstruction: { parts: [{ text: SYS }] }
      })
    });
    if(!r.ok){
      const errText = await r.text();
      return `API ERROR ${r.status}: ${errText}`;
    }
    const d = await r.json();
    return d.candidates?.[0]?.content?.parts?.[0]?.text || `NO TEXT. Raw: ${JSON.stringify(d).slice(0,300)}`;
  }catch(e){
    return `FETCH ERROR: ${e.message} (${e.name})`;
  }
}

async function doSend(){
  const txt = chatInp.value.trim(); if(!txt) return;
  chatInp.value = '';
  const ch = document.getElementById('chips'); if(ch) ch.style.display='none';
  addBub(txt, true); addECG();
  const reply = await callGemini(txt);
  removeECG(); addBub(reply, false);
}

document.getElementById('sndBtn').addEventListener('click', doSend);
chatInp.addEventListener('keypress', e=>{ if(e.key==='Enter') doSend(); });
document.querySelectorAll('.chip').forEach(c=>{
  c.addEventListener('click',()=>{ chatInp.value=c.dataset.m; doSend(); });
});

// ===== SCAM DETECTOR =====
function keywordDetect(txt){
  const scamWords = ['guarantee','guaranteed','100%','no documents','pay now','insider','cash only','bitcoin','western union','moneygram','no receipt','secret contact','fast track guaranteed','inside connection','home office contact','pay for cos','buy cos','no refusal','agent fee','service charge','handling fee','border force contact','cannot be denied'];
  const isScam = scamWords.some(k=>txt.includes(k));
  const amounts = txt.match(/£[\d,]+/g) || [];
  const highAmount = amounts.some(a=>parseInt(a.replace(/[£,]/g,''))>=3000);
  return isScam || highAmount;
}

async function runDetector(){
  const raw = document.getElementById('detInp').value.trim();
  if(!raw) return;
  const txt = raw.toLowerCase();
  const res = document.getElementById('detRes');
  const vEl = document.getElementById('detV');
  const tEl = document.getElementById('detT');
  res.className = 'det-res on';
  vEl.textContent = 'Checking...';
  tEl.innerHTML = '<div class="ecg-wrap"><svg viewBox="0 0 56 20"><path class="ecg-path" d="M0 10 L8 10 L12 3 L16 17 L20 10 L28 10 L32 6 L36 14 L40 10 L56 10"/></svg></div>';

  try{
      const prompt = `Someone in the UK immigration process was told this, or quoted this:\n"${raw}"\n\nAssess whether this is a scam, overpriced, or legitimate, based on real UK immigration rules (CoS is free, no one can guarantee a visa, published Home Office fees, OISC regulation). Respond with a first line starting exactly with "SCAM" or "LEGIT" or "CAUTION", then on following lines a short, direct explanation (under 120 words) of why, what it should actually cost or whether it's free, and what to do next. No markdown asterisks.`;
      const r = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ role: 'user', parts: [{ text: prompt }] }],
          systemInstruction: { parts: [{ text: SYS }] }
        })
      });
      if(!r.ok){
        const errText = await r.text();
        res.className = 'det-res scam on';
        vEl.textContent = 'API ERROR';
        tEl.innerHTML = `Status: ${r.status}<br>Response: ${errText}`;
        return;
      }
      const d = await r.json();
      const text = d.candidates?.[0]?.content?.parts?.[0]?.text;
      if(text){
        const firstLine = text.split('\n')[0].toUpperCase();
        const rest = text.split('\n').slice(1).join('<br>').trim() || text;
        const isScam = firstLine.includes('SCAM');
        const isCaution = firstLine.includes('CAUTION');
        res.className = 'det-res ' + (isScam ? 'scam' : isCaution ? 'scam' : 'ok') + ' on';
        vEl.textContent = isScam ? '⚠ THIS LOOKS LIKE A SCAM' : isCaution ? '⚠ PROCEED WITH CAUTION' : '✓ THIS APPEARS LEGITIMATE';
        tEl.innerHTML = rest;
        return;
      }
      res.className = 'det-res scam on';
      vEl.textContent = 'API ERROR';
      tEl.innerHTML = `No text in response.<br>Raw: ${JSON.stringify(d).slice(0,500)}`;
      return;
  }catch(e){
      res.className = 'det-res scam on';
      vEl.textContent = 'FETCH ERROR';
      tEl.innerHTML = `${e.message} (${e.name})`;
      return;
  }
}

document.getElementById('detBtn').addEventListener('click', runDetector);

  });
});

function updateCheckProgress(){
  const all = document.querySelectorAll('.check-item');
  const checked = document.querySelectorAll('.check-item.checked');
  if(all.length) document.getElementById('checkProgress').textContent = `${checked.length} of ${all.length} gathered`;
}

  const top = 10 + Math.random() * 35;
  pEl.style.top = top + '%';
  pEl.style.right = '-60px';
  gsap.to(pEl,{opacity:.4, duration:.6});
  gsap.to(pEl,{right:(gW+80)+'px', duration:7, ease:'none',
    onComplete:()=>{ pEl.style.right='-60px'; gsap.set(pEl,{opacity:0}); setTimeout(flyPlane, 18000); }
  });
}
